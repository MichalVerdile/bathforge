server.port=${PORT:8080}
server.servlet.context-path=/

# Database configuration
# Local default: H2 in-memory
# Production (Railway): set SPRING_DATASOURCE_URL/USERNAME/PASSWORD env vars (typically Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# If you use Postgres on Railway, also set:
# spring.datasource.driver-class-name=org.postgresql.Driver
# (or leave unset and let Spring infer)

# H2 Console (development only)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.bathforge=INFO
logging.level.org.springframework.web=WARN
logging.level.com.bathforge.service.ai=INFO

# BathForge Configuration
bathforge.auto-import.enabled=true
bathforge.auto-import.skip-if-products-exist=true

# OpenAI Configuration (set these as Railway variables)
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=${OPENAI_API_MODEL:gpt-5-nano}
openai.api.timeout=${OPENAI_API_TIMEOUT:150000}

# Email Configuration (set these as Railway variables)
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:5000}

# Sender Email (must be verified in your SMTP provider)
bathforge.sender.email=${SENDER_EMAIL:}

# Industry Email (where quote requests are sent)
bathforge.industry.email=${INDUSTRY_EMAIL:}

# JWT Configuration
jwt.secret=${JWT_SECRET:bathforge-super-secret-key-for-jwt-token-generation-must-be-at-least-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}
